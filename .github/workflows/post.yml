name: Threads 게시

on:
  # 수동 실행 (원할 때 바로 게시)
  workflow_dispatch:
    inputs:
      content_folder:
        description: '콘텐츠 폴더명 (예: 2026-03-14_가전_삼성프리스타일2)'
        required: true
      post_text:
        description: '게시 텍스트 (1~2줄)'
        required: true
      comment_text:
        description: '댓글 텍스트 (링크 포함)'
        required: true

  # 예약 실행 (cron - UTC 기준, 한국시간 -9시간)
  # 예: 한국 21시 = UTC 12시 → '0 12 * * *'
  # schedule:
  #   - cron: '0 12 * * *'

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: 이미지 URL 생성
        id: urls
        run: |
          FOLDER="contents/threads/${{ github.event.inputs.content_folder }}"
          BASE="https://raw.githubusercontent.com/${{ github.repository }}/main"

          # URL 인코딩된 폴더 경로
          ENCODED_FOLDER=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${FOLDER}'))")

          echo "slide1=${BASE}/${ENCODED_FOLDER}/slide1-hook.png" >> $GITHUB_OUTPUT
          echo "slide2=${BASE}/${ENCODED_FOLDER}/slide2-product.png" >> $GITHUB_OUTPUT
          echo "slide3=${BASE}/${ENCODED_FOLDER}/slide3-review.png" >> $GITHUB_OUTPUT
          echo "slide4=${BASE}/${ENCODED_FOLDER}/slide4-cta.png" >> $GITHUB_OUTPUT

      - name: 캐러셀 게시
        id: post
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: |
          python3 -c "
          import requests, time, os

          token = os.environ['THREADS_ACCESS_TOKEN']
          base = 'https://graph.threads.net/v1.0'

          # 사용자 ID
          me = requests.get(f'{base}/me', params={'fields':'id','access_token':token}).json()
          user_id = me['id']
          print(f'User: {user_id}')

          # 캐러셀 아이템 생성
          urls = [
            '${{ steps.urls.outputs.slide1 }}',
            '${{ steps.urls.outputs.slide2 }}',
            '${{ steps.urls.outputs.slide3 }}',
            '${{ steps.urls.outputs.slide4 }}'
          ]

          item_ids = []
          for i, url in enumerate(urls):
            r = requests.post(f'{base}/{user_id}/threads', params={
              'media_type':'IMAGE','image_url':url,
              'is_carousel_item':'true','access_token':token
            }).json()
            item_ids.append(r['id'])
            print(f'  Item {i+1}: {r[\"id\"]}')

          # 캐러셀 컨테이너
          time.sleep(10)
          text = '''${{ github.event.inputs.post_text }}'''
          r = requests.post(f'{base}/{user_id}/threads', params={
            'media_type':'CAROUSEL','children':','.join(item_ids),
            'text':text,'access_token':token
          }).json()
          carousel_id = r['id']
          print(f'Carousel: {carousel_id}')

          # 발행
          time.sleep(10)
          r = requests.post(f'{base}/{user_id}/threads_publish', params={
            'creation_id':carousel_id,'access_token':token
          }).json()
          post_id = r['id']
          print(f'Published: {post_id}')

          # 댓글
          time.sleep(5)
          comment = '''${{ github.event.inputs.comment_text }}'''
          r = requests.post(f'{base}/{user_id}/threads', params={
            'media_type':'TEXT','text':comment,
            'reply_to_id':post_id,'access_token':token
          }).json()
          comment_cid = r['id']

          time.sleep(5)
          r = requests.post(f'{base}/{user_id}/threads_publish', params={
            'creation_id':comment_cid,'access_token':token
          }).json()
          print(f'Comment: {r[\"id\"]}')
          print('Done!')
          "
